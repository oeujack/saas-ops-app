services:
  postgres:
    image: postgres:16-alpine
    container_name: saas-ops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: saasops
      POSTGRES_PASSWORD: saasops_dev_pass
      POSTGRES_DB: saasops
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U saasops -d saasops']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: saas-ops-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes --requirepass saasops_redis_pass
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'saasops_redis_pass', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: saas-ops-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: saasops_meili_key
      MEILI_ENV: development
    ports:
      - '7700:7700'
    volumes:
      - meilisearch_data:/meili_data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: saas-ops-api
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://saasops:saasops_dev_pass@postgres:5432/saasops
      REDIS_URL: redis://:saasops_redis_pass@redis:6379
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: saasops_meili_key
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_EXPIRES_IN: 7d
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - api_node_modules:/app/node_modules
      - api_app_node_modules:/app/apps/api/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: saas-ops-web
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      API_TARGET_URL: http://api:3001
    volumes:
      - ./apps/web:/app/apps/web
      - web_node_modules:/app/node_modules
      - web_app_node_modules:/app/apps/web/node_modules
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  api_node_modules:
  api_app_node_modules:
  web_node_modules:
  web_app_node_modules:
